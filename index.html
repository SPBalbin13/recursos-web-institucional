<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día Internacional de la Mujer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap');

  :root {
    --lav1: #e8e0f7;
    --lav2: #c3aee8;
    --lav3: #9b7fd4;
    --lav4: #6a4fa3;
    --blush: #f0d6e8;
    --blush2: #d4a0c0;
    --white: #faf8ff;
    --dark: #0d0b18;
    --glass: rgba(232,224,247,.07);
    --glass-border: rgba(195,174,232,.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Jost', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* NEBULA */
  .nebula {
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(106,79,163,.28) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(195,174,232,.18) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(155,127,212,.1) 0%, transparent 70%),
      var(--dark);
    animation: nebulaShift 18s ease-in-out infinite alternate;
  }
  @keyframes nebulaShift {
    0%   { filter:hue-rotate(0deg) brightness(1); }
    50%  { filter:hue-rotate(15deg) brightness(1.08); }
    100% { filter:hue-rotate(-10deg) brightness(.95); }
  }

  /* CANVASES */
  #stars-canvas { position:fixed; inset:0; z-index:1; pointer-events:none; }
  #fw-canvas    { position:fixed; inset:0; z-index:15; pointer-events:none; }

  /* MUSIC BTN */
  #music-btn {
    position:fixed; top:1.2rem; right:1.4rem; z-index:50;
    width:46px; height:46px; border-radius:50%;
    border:1px solid var(--glass-border);
    background:rgba(195,174,232,.12);
    backdrop-filter:blur(12px);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .3s; color:var(--lav2);
  }
  #music-btn:hover { background:rgba(195,174,232,.25); transform:scale(1.08); }
  .bar-wrap { display:flex; gap:3px; align-items:flex-end; height:18px; }
  .bar { width:3px; background:var(--lav2); border-radius:2px; height:8px; transition:height .1s; }
  #music-btn.playing .bar { animation:barDance .55s ease-in-out infinite alternate; }
  #music-btn.playing .bar:nth-child(2) { animation-delay:.15s; }
  #music-btn.playing .bar:nth-child(3) { animation-delay:.3s; }
  @keyframes barDance { from{height:4px} to{height:16px} }

  /* LAYOUT */
  .page {
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center;
    padding:0 1.2rem 5rem;
  }

  /* TITLE */
  .title-block {
    text-align:center; padding:3rem 2rem 1rem;
    animation:fadeDown 1.2s cubic-bezier(.22,1,.36,1) both;
  }
  .date-badge {
    display:inline-block; font-size:.72rem; font-weight:400;
    letter-spacing:.3em; text-transform:uppercase;
    color:var(--lav2); opacity:.75;
    border:1px solid var(--glass-border); padding:.3rem 1rem;
    border-radius:999px; margin-bottom:1.2rem;
    backdrop-filter:blur(6px); background:var(--glass);
  }
  .title-block h1 {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(2.2rem,7vw,4.6rem);
    font-weight:300; line-height:1.1;
    background:linear-gradient(135deg,var(--white) 0%,var(--lav2) 45%,var(--blush2) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 30px rgba(195,174,232,.4));
    letter-spacing:.02em;
  }
  .title-block h1 em { font-style:italic; font-weight:300; }
  .tagline {
    margin-top:.9rem; font-size:clamp(.78rem,1.8vw,.94rem);
    font-weight:200; letter-spacing:.22em;
    color:rgba(232,224,247,.42); text-transform:uppercase;
  }

  /* HEART */
  #heart-canvas {
    display:block; margin:2rem auto 0;
    animation:fadeIn 2s ease both .5s;
    cursor:pointer;
    filter:drop-shadow(0 0 22px rgba(155,127,212,.35));
  }

  /* MESSAGE CARD */
  .message-card {
    margin:2.5rem auto 0; max-width:580px; width:100%;
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:24px; padding:2.2rem 2.8rem;
    text-align:center; backdrop-filter:blur(18px);
    animation:fadeUp 1.5s ease both 1s;
    box-shadow:0 8px 48px rgba(106,79,163,.12),inset 0 1px 0 rgba(255,255,255,.06);
  }
  .quote-icon {
    font-family:'Cormorant Garamond',serif;
    font-size:3.5rem; line-height:.4;
    color:var(--lav3); opacity:.5;
    display:block; margin-bottom:.6rem;
  }
  #typewriter-text {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(1rem,2.2vw,1.18rem);
    font-style:italic; font-weight:300;
    line-height:2; color:rgba(240,230,255,.88);
    min-height:6rem;
  }
  .cursor {
    display:inline-block; width:2px; height:1.1em;
    background:var(--lav2); vertical-align:middle;
    margin-left:2px; animation:blink .7s steps(1) infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .signature {
    margin-top:1.4rem; font-size:.72rem; font-weight:400;
    letter-spacing:.22em; text-transform:uppercase;
    color:var(--lav2); opacity:.55;
  }

  /* DIVIDER */
  .divider {
    width:100%; max-width:500px; margin:2.8rem auto 0;
    display:flex; align-items:center; gap:1rem;
    animation:fadeIn 1s ease both 1.6s;
  }
  .divider::before,.divider::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg,transparent,var(--glass-border),transparent);
  }
  .divider span {
    font-family:'Cormorant Garamond',serif;
    font-style:italic; font-size:.9rem;
    color:var(--lav3); opacity:.7; white-space:nowrap;
  }

  /* NAMES */
  .names-section {
    width:100%; max-width:820px; margin:2rem auto 0;
    animation:fadeUp 1.5s ease both 1.8s;
  }
  .names-section h2 {
    text-align:center;
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(1rem,3vw,1.45rem);
    font-weight:300; font-style:italic;
    color:var(--lav2); margin-bottom:1.4rem; letter-spacing:.05em;
  }
  .names-grid { display:flex; flex-wrap:wrap; gap:.55rem; justify-content:center; }
  .empty-hint {
    width:100%; text-align:center;
    font-family:'Cormorant Garamond',serif;
    font-style:italic; font-size:1rem;
    color:rgba(195,174,232,.3); letter-spacing:.06em;
    padding:1.5rem 0;
    animation: fadeIn 1s ease both;
  }
  .name-pill {
    padding:.42rem 1.2rem; border-radius:999px;
    background:rgba(155,127,212,.1);
    border:1px solid rgba(155,127,212,.22);
    font-size:.82rem; font-weight:300;
    color:rgba(240,230,255,.8); letter-spacing:.07em;
    transition:all .28s ease; cursor:pointer; user-select:none;
  }
  .name-pill:hover {
    background:rgba(155,127,212,.28); border-color:var(--lav3);
    color:var(--white); transform:translateY(-3px);
    box-shadow:0 6px 22px rgba(155,127,212,.32);
  }

  /* PETALS */
  .petal {
    position:fixed; pointer-events:none; z-index:3;
    animation:petalFall linear forwards; opacity:0;
  }
  @keyframes petalFall {
    0%   { transform:translateY(-20px) rotate(0deg) scale(1);    opacity:.7; }
    100% { transform:translateY(105vh) rotate(520deg) scale(.6); opacity:0; }
  }

  /* FOOTER */
  footer {
    margin-top:3.5rem; text-align:center;
    font-size:.7rem; letter-spacing:.2em;
    color:rgba(195,174,232,.18); text-transform:uppercase;
    animation:fadeIn 2s ease both 2.4s;
  }

  /* KEYFRAMES */
  @keyframes fadeDown { from{opacity:0;transform:translateY(-28px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(28px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
  @keyframes pillPop  {
    0%  {transform:scale(0) rotate(-10deg);opacity:0}
    70% {transform:scale(1.15) rotate(2deg);opacity:1}
    100%{transform:scale(1) rotate(0deg);opacity:1}
  }
  .pill-new { animation:pillPop .45s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes labelFloat {
    0%  {opacity:0;transform:translate(-50%,-70%) scale(.6)}
    18% {opacity:1;transform:translate(-50%,-115%) scale(1.05)}
    75% {opacity:1;transform:translate(-50%,-160%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-200%) scale(.85)}
  }
</style>
</head>
<body>

<div class="nebula"></div>
<canvas id="stars-canvas"></canvas>
<canvas id="fw-canvas"></canvas>

<button id="music-btn" title="Activar música">
  <div class="bar-wrap">
    <div class="bar"></div>
    <div class="bar" style="height:12px"></div>
    <div class="bar" style="height:6px"></div>
  </div>
</button>

<div class="page">

  <div class="title-block">
    <div class="date-badge">8 de Marzo · 2026</div>
    <h1>Feliz <em>Día Internacional</em><br>de la Mujer</h1>
    <p class="tagline">Celebrando su luz &nbsp;·&nbsp; su fuerza &nbsp;·&nbsp; su esencia</p>
  </div>

  <canvas id="heart-canvas" width="340" height="320" title="Clic para celebrar"></canvas>

  <div class="message-card">
    <span class="quote-icon">"</span>
    <div id="typewriter-text"><span class="cursor"></span></div>
    <p class="signature">Con amor &amp; admiración &nbsp;✦&nbsp; 8 de Marzo</p>
  </div>

  <div class="divider"><span>✦ Mujeres extraordinarias ✦</span></div>

  <div class="names-section">
    <h2>Haz clic en tu nombre para celebrarte ✨</h2>
    <div class="names-grid" id="names-grid"></div>
  </div>

  <footer>Día Internacional de la Mujer &nbsp;·&nbsp; Con amor</footer>
</div>

<script>
/* ── DATA ── */
let NAMES = [
  "Maricela","Soledad","Roxana","Erika","Fiorella","Yenefir",
  "Karin","Gina","Joana","Sullin","Diana","Sandy",
  "Rocio","Ximena","Fiorela","Reymi","Melani","Wendy",
  "Jehymmi","Dina","Claudia","Rosario G.","Rosario R.","Mily",
  "Blanca","Arely","Elisa","Asuncion","María","Ysabel",
  "Patricia","Martha","Melissa","Luisa","Susan","Paola",
  "Doris","Stephanie","Jheidy"
];
const MESSAGE = "A cada mujer que ilumina el mundo con su fuerza, su ternura y su valentía... Hoy y siempre, gracias por existir. Su presencia transforma todo lo que toca. Son la luz que guía, el amor que sostiene y la valentía que inspira a seguir adelante.";

/* ── STARS ── */
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');
  let stars=[];
  function resize(){
    c.width=innerWidth;c.height=innerHeight;
    stars=Array.from({length:280},()=>({
      x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*1.4+.2,a:Math.random(),
      speed:Math.random()*.006+.002,
      hue:230+Math.random()*80
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.speed;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${s.hue},55%,90%,${.3+.7*Math.abs(Math.sin(s.a))})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize);resize();draw();
})();

/* ── MUSIC – music/music V1.mp3 ── */
const audio = new Audio('music/music V1.mp3');
audio.loop = true;
audio.volume = 0.7;

const musicBtn = document.getElementById('music-btn');
let musicPlaying = false;

musicBtn.addEventListener('click', () => {
  if (!musicPlaying) {
    audio.play();
    musicPlaying = true;
    musicBtn.classList.add('playing');
  } else {
    audio.pause();
    musicPlaying = false;
    musicBtn.classList.remove('playing');
  }
});

/* ── HEART ── */
(function(){
  const c=document.getElementById('heart-canvas'),ctx=c.getContext('2d');
  const W=c.width,H=c.height,TOTAL=1500;
  let t=0,beatScale=1;

  function heartXY(theta){
    const x=16*Math.pow(Math.sin(theta),3);
    const y=-(13*Math.cos(theta)-5*Math.cos(2*theta)-2*Math.cos(3*theta)-Math.cos(4*theta));
    return{x:W/2+x*10.2,y:H/2+y*10.2-8};
  }

  const particles=Array.from({length:TOTAL},(_,i)=>{
    const theta=(i/TOTAL)*Math.PI*2,base=heartXY(theta);
    const hue=Math.random()<.5?(260+Math.random()*40):(290+Math.random()*30);
    return{
      tx:base.x,ty:base.y,
      x:W/2+(Math.random()-.5)*W,y:H/2+(Math.random()-.5)*H,
      size:Math.random()*2.1+.4,
      hue,sat:50+Math.random()*30,lit:70+Math.random()*20,
      alpha:Math.random()*.5+.4,phase:Math.random()*Math.PI*2
    };
  });

  let beatScale2=1;
  setInterval(()=>{beatScale=1.13;},960);

  c.addEventListener('click',e=>{
    const r=c.getBoundingClientRect();
    launchFirework(r.left+W/2,r.top+H/2,null);
    beatScale=1.22;
  });

  function draw(){
    ctx.clearRect(0,0,W,H);t+=.016;
    beatScale+=(1-beatScale)*.08;
    particles.forEach(p=>{
      p.x+=(p.tx-p.x)*.025;p.y+=(p.ty-p.y)*.025;
      const pulse=beatScale*(1+.06*Math.sin(t*1.8+p.phase));
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*pulse,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},${p.sat}%,${p.lit}%,${p.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── TYPEWRITER ── */
(function(){
  const el=document.getElementById('typewriter-text');
  let i=0;
  function type(){
    if(i<MESSAGE.length){
      el.innerHTML=MESSAGE.slice(0,i+1).replace(/\n/g,'<br>')+'<span class="cursor"></span>';
      i++;setTimeout(type,36+Math.random()*26);
    } else {
      el.innerHTML=MESSAGE.replace(/\n/g,'<br>')+'<span class="cursor"></span>';
    }
  }
  setTimeout(type,1600);
})();

/* ── FIREWORKS ── */
const fwCanvas=document.getElementById('fw-canvas'),fwCtx=fwCanvas.getContext('2d');
function resizeFW(){fwCanvas.width=innerWidth;fwCanvas.height=innerHeight;}
addEventListener('resize',resizeFW);resizeFW();

let fwParticles=[];
const FW_PALETTE=['#c3aee8','#9b7fd4','#e8d8f5','#f0d6e8','#d4a0c0','#ffffff','#b09ad6','#e0c8f0','#ddb8e8'];

function launchFirework(x,y,label){
  const count=100+Math.floor(Math.random()*55);
  for(let i=0;i<count;i++){
    const angle=(Math.PI*2/count)*i+(Math.random()-.5)*.4;
    const speed=2.8+Math.random()*5.5;
    fwParticles.push({
      x,y,
      vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-Math.random()*.5,
      alpha:1,size:1.8+Math.random()*2.8,
      color:FW_PALETTE[Math.floor(Math.random()*FW_PALETTE.length)],
      decay:.011+Math.random()*.016,gravity:.055+Math.random()*.045,trail:[]
    });
  }
  if(label) spawnLabel(x,y,label);
}

function spawnLabel(x,y,name){
  const el=document.createElement('div');
  el.textContent='✦ '+name+' ✦';
  Object.assign(el.style,{
    position:'fixed',left:x+'px',top:(y-16)+'px',
    transform:'translate(-50%,-100%)',
    fontFamily:"'Cormorant Garamond',serif",
    fontStyle:'italic',fontSize:'1.15rem',color:'#e8e0f7',
    textShadow:'0 0 14px rgba(195,174,232,.9),0 0 28px rgba(155,127,212,.6)',
    pointerEvents:'none',zIndex:'20',whiteSpace:'nowrap',
    animation:'labelFloat 2.2s ease forwards'
  });
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

function drawFW(){
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  fwParticles=fwParticles.filter(p=>p.alpha>.015);
  fwParticles.forEach(p=>{
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>7)p.trail.shift();
    for(let i=0;i<p.trail.length-1;i++){
      fwCtx.beginPath();
      fwCtx.moveTo(p.trail[i].x,p.trail[i].y);
      fwCtx.lineTo(p.trail[i+1].x,p.trail[i+1].y);
      fwCtx.strokeStyle=p.color;
      fwCtx.globalAlpha=p.alpha*(i/p.trail.length)*.4;
      fwCtx.lineWidth=p.size*.5;fwCtx.stroke();
    }
    fwCtx.globalAlpha=1;
    fwCtx.beginPath();fwCtx.arc(p.x,p.y,p.size*p.alpha,0,Math.PI*2);
    fwCtx.fillStyle=p.color;fwCtx.globalAlpha=p.alpha;fwCtx.fill();
    const g=fwCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*2.5);
    g.addColorStop(0,p.color);g.addColorStop(1,'transparent');
    fwCtx.beginPath();fwCtx.arc(p.x,p.y,p.size*2.5*p.alpha,0,Math.PI*2);
    fwCtx.fillStyle=g;fwCtx.globalAlpha=p.alpha*.28;fwCtx.fill();
    fwCtx.globalAlpha=1;
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.97;p.alpha-=p.decay;
  });
  requestAnimationFrame(drawFW);
}
drawFW();

/* ── PILLS ── */
const grid=document.getElementById('names-grid');

function createPill(name,isNew=false){
  const pill=document.createElement('div');
  pill.className='name-pill'+(isNew?' pill-new':'');
  pill.textContent=name;
  pill.addEventListener('click',()=>{
    const r=pill.getBoundingClientRect();
    launchFirework(r.left+r.width/2,r.top+r.height/2,name);
    pill.style.cssText+=';transition:all .12s;background:rgba(155,127,212,.5);box-shadow:0 0 28px rgba(155,127,212,.8),0 0 55px rgba(195,174,232,.4);color:#fff;transform:scale(1.18)';
    setTimeout(()=>{pill.style.background='';pill.style.boxShadow='';pill.style.color='';pill.style.transform='';},420);
  });
  return pill;
}

NAMES.forEach(n=>grid.appendChild(createPill(n)));


/* ── PETALS ── */
const PETALS=['🌸','🌷','✨','💜','🤍','💫','🌺'];
function spawnPetal(){
  const el=document.createElement('div');
  el.className='petal';
  el.textContent=PETALS[Math.floor(Math.random()*PETALS.length)];
  el.style.left=Math.random()*100+'vw';
  el.style.top='-30px';
  const dur=7+Math.random()*9;
  el.style.animationDuration=dur+'s';
  el.style.fontSize=(.7+Math.random()*.9)+'rem';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),(dur+1)*1000);
}
setInterval(spawnPetal,900);
</script>
</body>
</html>
